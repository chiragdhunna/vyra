name: vyra
description: "Vyra — your personal AI assistant. A beautifully crafted, emotionally engaging mobile companion powered by Google Gemini."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The version and build number for Vyra.
version: 1.0.0+1

environment:
  sdk: ^3.7.2

# Dependencies specify other packages that Vyra needs in order to work.
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- State management ---
  flutter_riverpod: ^2.5.1

  # --- AI engine (Google Gemini, replaces OpenAI GPT) ---
  google_generative_ai: ^0.4.6

  # --- Voice interaction ---
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # --- Vision (on-device, privacy friendly) ---
  camera: ^0.11.0+2
  google_mlkit_face_detection: ^0.13.1

  # --- Assistant tools ---
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  http: ^1.2.2
  geolocator: ^13.0.2

  # --- Storage ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3

  # --- Platform / config ---
  firebase_core: ^2.24.2
  flutter_dotenv: ^5.2.1
  permission_handler: ^11.3.1

  # --- Utilities / UI ---
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.5.1
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  # Assets bundled with Vyra.
  assets:
    - assets/
    - .env

  # Fonts are loaded at runtime via the google_fonts package (Poppins / Inter),
  # so no local font files need to be declared here.
