name: Internal APK Build (Fastlane)

on:
  push:
    branches: [main, develop]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type for the production release"
        required: false
        type: choice
        default: "patch"
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build-internal:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # Cache Ruby dependencies to speed up the process
      - name: Cache Ruby gems
        uses: actions/cache@v3
        with:
          path: android/vendor/bundle
          key: ${{ runner.os }}-ruby-${{ hashFiles('android/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-ruby-

      # Setup Ruby environment
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      # Install dependencies (bundler, gems)
      - name: Install dependencies
        run: |
          gem install bundler
          cd android
          bundle install

      # Ensure Fastlane directory and initialize Fastlane if necessary
      - name: Setup Fastlane
        run: |
          cd android/fastlane
          if [ ! -f ./Fastfile ]; then
            bundle exec fastlane init
          fi

      # Install Fastlane plugins (only if not installed)
      - name: Install Fastlane Plugins
        run: |
          cd android/fastlane
          bundle exec fastlane add_plugin firebase_app_distribution

      # Setup Flutter environment (Flutter 3.29.2 to match your local setup)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.2"
          channel: "stable"
          cache: true

      - name: Create .env from GitHub Secrets
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "GEMINI_MODEL=gemini-2.5-flash" >> .env
          echo "OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}" >> .env
          echo "FIREBASE_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY }}" >> .env
          echo "FIREBASE_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID }}" >> .env
          echo "FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_ANDROID_MESSAGING_SENDER_ID }}" >> .env
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_ANDROID_PROJECT_ID }}" >> .env
          echo "FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_ANDROID_STORAGE_BUCKET }}" >> .env

      # Install Flutter dependencies
      - name: Install Flutter Dependencies
        run: flutter pub get

      # Write the Firebase service account key and expose its path to the lane
      - name: Write Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          echo "FIREBASE_SERVICE_ACCOUNT_FILE=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      # Run Fastlane 'prod' lane
      - name: Run Fastlane prod lane
        run: |
          cd android/fastlane
          bundle exec fastlane android prod

      # Upload the APK artifact (consumed by build-prod below)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vyra-prod-apk
          path: build/app/outputs/flutter-apk/app-prod-release.apk
          if-no-files-found: warn

      # Create an "Internal Build" pre-release whenever this run targets main
      - name: Create Internal Release (main only)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: internal-${{ github.run_number }}
          name: "Internal Build #${{ github.run_number }}"
          body: |
            Automated internal build from `main`.
            Commit: ${{ github.sha }}
          files: build/app/outputs/flutter-apk/app-prod-release.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-prod:
    needs: build-internal
    if: success() && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full tag history to compute the next version

      # Reuse the APK that build-internal already produced — no rebuild needed
      - name: Download internal build artifact
        uses: actions/download-artifact@v4
        with:
          name: vyra-prod-apk
          path: artifact

      # Determine the release tag:
      # - Tag push (v*): use that tag as-is.
      # - Push to main / manual dispatch: auto-bump the latest vX.Y.Z tag
      #   (bump type from input, default "patch").
      - name: Determine release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            bump="${{ github.event.inputs.bump }}"
            bump="${bump:-patch}"
            latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
            if [ -z "$latest" ]; then
              latest="v0.0.0"
            fi
            latest="${latest#v}"
            IFS='.' read -r major minor patch <<< "$latest"
            case "$bump" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              *) patch=$((patch + 1)) ;;
            esac
            new_tag="v${major}.${minor}.${patch}"
            echo "Latest tag: v${latest} -> New tag: ${new_tag}"
            echo "tag=${new_tag}" >> "$GITHUB_OUTPUT"
          fi

      # Create the production release and upload the APK.
      # prerelease defaults to false, so this takes over "Latest".
      - name: Create Production Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: "Release ${{ steps.release_tag.outputs.tag }}"
          body: |
            Production release ${{ steps.release_tag.outputs.tag }}
            Commit: ${{ github.sha }}
          files: artifact/app-prod-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
