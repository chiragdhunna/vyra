name: Test & Analyze

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.3" # ✅ This supports Dart 3.7.2
      - run: flutter config --no-analytics --no-cli-animations
      # dotenv loads `.env` (declared as an asset). Create it so tooling that
      # bundles assets is happy; values are not needed for analyze/test.
      - name: Create .env
        run: cp .env.example .env
      - run: flutter pub get
      # Style lints (const, etc.) are reported as info; don't fail CI on them.
      # Real warnings/errors still fail the build.
      - run: flutter analyze --no-fatal-infos
      - run: flutter test
