name: Production APK Build

on:
  push:
    tags:
      - "v*"

jobs:
  build-prod-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Use Flutter 3.29.2 to match the local setup
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.2" # Updated to match your local Flutter version

      # `.env` is a declared asset and is git-ignored, so create it from secrets.
      - name: Create .env from GitHub Secrets
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "GEMINI_MODEL=gemini-1.5-flash" >> .env
          echo "OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}" >> .env
          echo "FIREBASE_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY }}" >> .env
          echo "FIREBASE_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID }}" >> .env
          echo "FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_ANDROID_MESSAGING_SENDER_ID }}" >> .env
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_ANDROID_PROJECT_ID }}" >> .env
          echo "FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_ANDROID_STORAGE_BUCKET }}" >> .env

      # Install Flutter dependencies
      - run: flutter pub get

      # Build the APK using the production flavor
      - run: flutter build apk --flavor prod -t lib/main_prod.dart

      # Upload the APK artifact
      - uses: actions/upload-artifact@v4
        with:
          name: vyra-prod-apk
          path: build/app/outputs/flutter-apk/app-prod-release.apk
          if-no-files-found: warn

      # Upload the APK to the GitHub Release
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-prod-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
