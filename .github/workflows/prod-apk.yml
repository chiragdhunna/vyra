name: Production APK Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: false
        type: choice
        default: "patch"
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build-prod-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history/tags to determine the latest version

      # Use Flutter 3.29.2 to match the local setup
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.2" # Updated to match your local Flutter version

      # `.env` is a declared asset and is git-ignored, so create it from secrets.
      - name: Create .env from GitHub Secrets
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "GEMINI_MODEL=gemini-2.5-flash" >> .env
          echo "OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}" >> .env
          echo "FIREBASE_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY }}" >> .env
          echo "FIREBASE_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID }}" >> .env
          echo "FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_ANDROID_MESSAGING_SENDER_ID }}" >> .env
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_ANDROID_PROJECT_ID }}" >> .env
          echo "FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_ANDROID_STORAGE_BUCKET }}" >> .env

      # Install Flutter dependencies
      - run: flutter pub get

      # Build the APK using the production flavor
      - run: flutter build apk --flavor prod -t lib/main_prod.dart

      # Upload the APK artifact
      - uses: actions/upload-artifact@v4
        with:
          name: vyra-prod-apk
          path: build/app/outputs/flutter-apk/app-prod-release.apk
          if-no-files-found: warn

      # Determine the release tag:
      # - On a tag push, use the pushed tag as-is.
      # - On manual dispatch, find the latest vX.Y.Z tag and bump it
      #   according to the selected bump type (default: patch).
      - name: Determine release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
            if [ -z "$latest" ]; then
              latest="v0.0.0"
            fi
            latest="${latest#v}"
            IFS='.' read -r major minor patch <<< "$latest"

            case "${{ github.event.inputs.bump }}" in
              major)
                major=$((major + 1)); minor=0; patch=0
                ;;
              minor)
                minor=$((minor + 1)); patch=0
                ;;
              *)
                patch=$((patch + 1))
                ;;
            esac

            new_tag="v${major}.${minor}.${patch}"
            echo "Latest tag: v${latest} -> New tag: ${new_tag}"
            echo "tag=${new_tag}" >> "$GITHUB_OUTPUT"
          fi

      # Create the Git tag and GitHub Release, and upload the APK.
      # Runs for both tag pushes and manual dispatch.
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: "Release ${{ steps.release_tag.outputs.tag }}"
          body: |
            Production release ${{ steps.release_tag.outputs.tag }}
            Commit: ${{ github.sha }}
          files: build/app/outputs/flutter-apk/app-prod-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
